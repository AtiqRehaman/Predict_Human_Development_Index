<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDI Prediction - Input Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="navbar">
        <div style="font-weight: 700; font-size: 18px; color: #38bdf8;">HDI Predictor</div>
        <div>
            <a href="/Home">Home</a>
            <a href="/Prediction">Predict</a>
        </div>
    </div>
    <h2>Predict Human Development Index</h2>
    <div class="form-container">
        <p style="text-align: center; margin-bottom: 25px; font-size: 14px; color: rgba(255, 255, 255, 0.8);">
            Enter the following indicators to predict the HDI value
        </p>
        <form action="/predict" method="post">
            <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Select Country (Encoded Value)</label>
            <select id="Country" name="Country" required>
                <option value="">-- Select Country --</option>
                <option value="0">Afghanistan</option>
                <option value="8">Australia</option>
                <option value="13">Bangladesh</option>
                <option value="31">Canada</option>
                <option value="76">India</option>
                <option value="138">Poland</option>
                <option value="179">Turkey</option>
            </select>
            
            <label style="display: block; margin-top: 20px; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Life Expectancy at Birth (years)</label>
            <input class="form-input" type="number" step="0.1" name="Life expectancy" placeholder="50-89 (e.g., 75.5)" required>
            
            <label style="display: block; margin-top: 20px; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Mean Years of Schooling</label>
            <input class="form-input" type="number" step="0.1" name="Mean years of schooling" placeholder="1-15 (e.g., 10.5)" required>
            
            <label style="display: block; margin-top: 20px; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Gross National Income (GNI) per Capita</label>
            <input class="form-input" type="number" step="100" name="Gross national income" placeholder="400-140000 (e.g., 15000)" required>
            
            <label style="display: block; margin-top: 20px; margin-bottom: 8px; font-weight: 600; font-size: 14px;">Internet Users (%)</label>
            <input class="form-input" type="number" step="0.1" name="Internet users" placeholder="0-100 (e.g., 85.5)" required>
            
            <input type="submit" class="logbtn" value="Predict HDI">
        </form>
        {% if showcase %}
        <div class="error-msg">{{ showcase | safe }}</div>
        {% endif %}
    </div>
</body>
</html>
